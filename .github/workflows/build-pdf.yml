name: Build PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build PDF
        run: ./build.sh

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: facts_fr
          path: dist/facts_fr.pdf
          if-no-files-found: error

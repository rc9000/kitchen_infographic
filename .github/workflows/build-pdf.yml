name: Build PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build PDF
        run: ./build.sh

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: facts_fr
          path: dist/facts_fr.pdf
          if-no-files-found: error
          retention-days: 30

      - name: Add workflow summary
        run: |
          {
            echo "## PDF artifact"
            echo ""
            echo "Built \`dist/facts_fr.pdf\`."
            echo ""
            echo "Download it from the **Artifacts** section at the bottom of this workflow run summary."
          } >> "$GITHUB_STEP_SUMMARY"
